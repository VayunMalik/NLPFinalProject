# Default training config for LeCun persona fine-tune.
# Paths are resolved relative to the repo root (the directory train.py is invoked from).

seed: 42

model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  use_4bit: true
  bnb_compute_dtype: "bfloat16"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

data:
  train_path: "data/splits/train.jsonl"
  dev_path: "data/splits/dev.jsonl"
  text_field: "text"
  max_seq_length: 1024
  packing: true

train:
  output_dir: "model/adapters/run_default"
  epochs: 3
  per_device_batch_size: 2
  grad_accum: 8
  lr: 2.0e-4
  warmup_ratio: 0.03
  weight_decay: 0.0
  lr_scheduler: "cosine"
  optim: "paged_adamw_8bit"
  eval_steps: 100
  save_steps: 200
  logging_steps: 20
  bf16: true
  gradient_checkpointing: true
